<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperTech</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

html,body{
height:100%;
width:100%;
}

body{
display:flex;
flex-direction:column;
}

.hero{
flex:1;
width:100%;
background: linear-gradient(to right,#0f2027,#203a43,#2c5364);

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

color:white;
padding:40px 20px;
}

.hero h1{
font-size:50px;
color:#00e0ff;
margin-bottom:15px;
}

.hero h2{
font-size:26px;
margin-bottom:20px;
}

.hero p{
max-width:700px;
line-height:1.6;
margin-bottom:30px;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
border-radius:10px;
margin-bottom:30px;
}

.hero button{
padding:14px 35px;
border:none;
border-radius:30px;
background:#00e0ff;
color:black;
font-weight:bold;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.hero button:hover{
background:white;
transform:scale(1.05);
}

footer{
background:black;
color:white;
text-align:center;
padding:12px;
width:100%;
}

</style>

</head>

<body>

<section class="hero">

<h1>WELCOME TO SUPERTECH</h1>

<h2>Empowering the Future with Smart Technology</h2>

<p>
A student-focused platform where you can learn, enroll in courses,
apply for global tech jobs, and connect with worldwide networks
that help you build your career.
</p>

<img src="/images/hero.png" alt="SuperTech Banner">

<h4>CLICK HERE TO CONNECT WITH US !!
<a href="/form.html">
<button>GET STARTED</button>
</a>
</h4>

</section>

<footer>
© SUPERTECH.COM
</footer>

</body>
</html>
